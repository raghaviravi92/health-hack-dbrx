bundle:
  name: data-readiness-desk

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID
  genie_space_id:
    description: Genie Space ID for AI/BI natural language queries
  postgres_branch:
    description: Full Lakebase Postgres branch resource name. Obtain by running `databricks postgres list-branches projects/{project-id}`, select the desired item from the output array and use its .name value.
  postgres_database:
    description: Full Lakebase Postgres database resource name. Obtain by running `databricks postgres list-databases {branch-name}`, select the desired item from the output array and use its .name value. Requires the branch resource name.

resources:
  apps:
    app:
      name: "data-readiness-desk"
      description: "Facility data readiness review desk with Lakebase-backed anomaly triage"
      source_code_path: ./
      user_api_scopes:
        - dashboards.genie
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: genie-space
          genie_space:
            name: genie-space
            space_id: ${var.genie_space_id}
            permission: CAN_RUN
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-5dc5c12d-0613.cloud.databricks.com

    variables:
      sql_warehouse_id: cd93d052cd252765
      genie_space_id: 01f168da6aac14dc917de63ed8a42bf9
      postgres_branch: projects/slrp-lakebase/branches/production
      postgres_database: projects/slrp-lakebase/branches/production/databases/databricks-postgres
